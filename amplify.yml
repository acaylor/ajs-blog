version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yum install -y git-lfs
        - git lfs install
        - git lfs pull
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
