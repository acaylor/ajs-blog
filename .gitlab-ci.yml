---
stages:
  - test
  - build

variables:
  TARGET_PLATFORMS: linux/amd64

lint:
  stage: test
  image: node:24-alpine
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm run check
    - npm run format:check

build_and_verify:
  stage: test
  image: node:24-alpine
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build
    # static a11y / HTML structure check on the rendered output
    - npm run a11y
    # internal link integrity (lychee is a Rust binary; fetch the musl build
    # rather than running a second CI job to avoid duplicate npm ci cost)
    - wget -qO- https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components=1 lychee-x86_64-unknown-linux-musl/lychee
    - ./lychee --offline --root-dir "$CI_PROJECT_DIR/dist" --config lychee.toml 'dist/**/*.html'
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

buildTesting:
  stage: build
  image:
    name: moby/buildkit:rootless
    entrypoint: ['']
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context="$CI_PROJECT_DIR" \
        --local dockerfile="$CI_PROJECT_DIR" \
        --opt platform="$TARGET_PLATFORMS" \
        --output type=image,name=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA,push=true
  rules:
    - if: '$CI_COMMIT_BRANCH == "testing"'

buildProduction:
  stage: build
  image:
    name: moby/buildkit:rootless
    entrypoint: ['']
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context="$CI_PROJECT_DIR" \
        --local dockerfile="$CI_PROJECT_DIR" \
        --opt platform="$TARGET_PLATFORMS" \
        --output type=image,name=$CI_REGISTRY_IMAGE:latest,push=true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
